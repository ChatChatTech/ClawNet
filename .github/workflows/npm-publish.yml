name: Publish npm packages

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 1.0.0-beta.2). Leave empty to auto-detect from daemon.go'
        required: false
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Check npm version
        run: |
          echo "Node: $(node -v)"
          echo "npm:  $(npm -v)"

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VER="${{ github.event.inputs.version }}"
          else
            VER=$(grep 'const Version' clawnet-cli/internal/daemon/daemon.go \
              | sed 's/.*"\(.*\)".*/\1/')
          fi
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "📦 Publishing version: $VER"

      - name: Bump package.json versions
        run: |
          VER="${{ steps.version.outputs.version }}"
          cd npm

          for pkg_json in \
            clawnet/package.json \
            clawnet-linux-x64/package.json \
            clawnet-linux-arm64/package.json \
            clawnet-darwin-x64/package.json \
            clawnet-darwin-arm64/package.json \
            clawnet-win32-x64/package.json; do
            if [ -f "$pkg_json" ]; then
              sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"${VER}\"/" "$pkg_json"
              echo "  ✓ $pkg_json"
            fi
          done

          sed -i "s/@cctech2077\/clawnet-\([^\"]*\)\": \"[^\"]*\"/@cctech2077\/clawnet-\1\": \"${VER}\"/g" \
            clawnet/package.json
          echo "  ✓ clawnet/package.json optionalDependencies"

      - name: Download binaries from GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VER="${{ steps.version.outputs.version }}"
          REPO="${{ github.repository }}"
          TAG="v${VER}"

          declare -A ASSETS=(
            ["clawnet-linux-x64"]="clawnet-linux-amd64"
            ["clawnet-linux-arm64"]="clawnet-linux-arm64"
            ["clawnet-darwin-x64"]="clawnet-darwin-amd64"
            ["clawnet-darwin-arm64"]="clawnet-darwin-arm64"
            ["clawnet-win32-x64"]="clawnet-windows-amd64.exe"
          )

          declare -A BIN_NAMES=(
            ["clawnet-linux-x64"]="clawnet"
            ["clawnet-linux-arm64"]="clawnet"
            ["clawnet-darwin-x64"]="clawnet"
            ["clawnet-darwin-arm64"]="clawnet"
            ["clawnet-win32-x64"]="clawnet.exe"
          )

          for dir in "${!ASSETS[@]}"; do
            asset="${ASSETS[$dir]}"
            bin_name="${BIN_NAMES[$dir]}"
            dest="npm/${dir}/bin/${bin_name}"
            mkdir -p "$(dirname "$dest")"

            url="https://github.com/${REPO}/releases/download/${TAG}/${asset}"
            echo "📥 ${asset} → ${dir}/bin/${bin_name}"

            # Retry up to 3 times with auth
            for attempt in 1 2 3; do
              curl -sL -H "Authorization: token ${GH_TOKEN}" \
                -H "Accept: application/octet-stream" \
                -o "$dest" "$url" && break
              echo "  Retry $attempt..."
              sleep 5
            done

            chmod +x "$dest"
            size=$(stat -c%s "$dest" 2>/dev/null || echo "0")
            echo "   $(( size / 1024 / 1024 )) MB"

            # Skip if binary is too small (< 1MB) — darwin may not exist
            if [ "$size" -lt 1048576 ]; then
              if echo "$dir" | grep -q "darwin"; then
                echo "⚠️ SKIP: ${asset} not available (no macOS CGO cross-compile)"
                rm -f "$dest"
              else
                echo "❌ ERROR: ${asset} is only ${size} bytes — download failed!"
                exit 1
              fi
            fi
          done

      - name: Publish platform packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VER="${{ steps.version.outputs.version }}"

          NPM_TAG="latest"
          if echo "$VER" | grep -q "beta\|alpha\|rc"; then
            NPM_TAG="beta"
          fi

          for dir in clawnet-linux-x64 clawnet-linux-arm64 clawnet-darwin-x64 clawnet-darwin-arm64 clawnet-win32-x64; do
            # Skip if binary wasn't downloaded (e.g., darwin)
            if [ ! -d "npm/${dir}/bin" ] || [ -z "$(ls -A npm/${dir}/bin/ 2>/dev/null)" ]; then
              echo "⏭️ Skipping @cctech2077/${dir} (no binary)"
              continue
            fi
            echo "📦 Publishing @cctech2077/${dir}@${VER} (tag: ${NPM_TAG})..."
            cd npm/${dir}
            npm publish --access public --tag "$NPM_TAG" 2>&1 || echo "⚠️ Failed: $dir"
            cd ../..
          done

      - name: Publish main wrapper
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VER="${{ steps.version.outputs.version }}"

          NPM_TAG="latest"
          if echo "$VER" | grep -q "beta\|alpha\|rc"; then
            NPM_TAG="beta"
          fi

          echo "📦 Publishing @cctech2077/clawnet@${VER} (tag: ${NPM_TAG})..."
          cd npm/clawnet
          npm publish --access public --tag "$NPM_TAG" 2>&1 || echo "⚠️ Failed: clawnet"

      - name: Verify
        run: |
          VER="${{ steps.version.outputs.version }}"
          echo ""
          echo "=== Verifying published packages ==="
          sleep 5
          for pkg in clawnet clawnet-linux-x64 clawnet-linux-arm64 clawnet-darwin-x64 clawnet-darwin-arm64 clawnet-win32-x64; do
            ver=$(npm view @cctech2077/$pkg@$VER version 2>/dev/null || echo "")
            if [ -n "$ver" ]; then
              echo "  ✅ @cctech2077/$pkg@$ver"
            else
              echo "  ❌ @cctech2077/$pkg NOT YET VISIBLE (may take a minute)"
            fi
          done
          echo ""
          echo "Install:"
          echo "  npm install -g @cctech2077/clawnet@${VER}"
          echo "  npm install -g @cctech2077/clawnet@${VER} --registry https://registry.npmmirror.com"
